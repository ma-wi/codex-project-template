name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      # Add project-specific runtime and dependency setup before verification.
      # Examples: actions/setup-java, actions/setup-node, actions/setup-python.

      - name: Verify repository
        run: ./scripts/verify.sh
