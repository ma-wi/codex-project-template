name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false

      - name: Set up Python from .python-version
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version-file: .python-version

      - name: Set up Node.js from .node-version
        if: ${{ hashFiles('**/package.json') != '' }}
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version-file: .node-version

      - name: Set up pinned uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78
        with:
          version: "0.11.29"
          enable-cache: true

      - name: Install locked project dependencies
        run: |
          if grep -qE "^[[:space:]]*name:[[:space:]]*['\"]?CHANGE_ME['\"]?[[:space:]]*$" .ai/project.yaml; then
            echo "Template state: project dependency setup is intentionally not run."
          else
            ./.ai/tools/ci-setup.sh
          fi

      - name: Verify template or configured project
        run: ./.ai/tools/verify.sh
