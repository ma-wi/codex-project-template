project:
  name: "CHANGE_ME"
  profile: "python"

stacks:
  python:
    enabled: true
    package_manager: "uv"
  react:
    enabled: false
    directory: "frontend"
    package_manager: "npm"
  bash:
    enabled: false
  dotnet:
    enabled: false
    solution: ""
    visual_basic: true
    powershell: true

engineering_knowledge:
  enabled: false
  mcp_server: "engineering-knowledge"
  required_for:
    - "initial_architecture"
    - "security_sensitive_design"
    - "public_api_design"
    - "new_framework_or_dependency"

quality:
  strict: true
  require_format: true
  require_lint: true
  require_tests: true
  require_security: true
  require_dependency_policy: true
  require_dependency_scanners: true
  require_build: true

ide:
  create_project_rules: true
  create_git_mapping: true
  self_review_rules: ".aiassistant/review/self-review.md"


documentation:
  run_curator_on_closeout: true
  run_curator_before_release: true
  budgets:
    agents_md_lines: 240
    project_context_lines: 250
    current_plan_lines: 35
    next_steps_items: 10
    active_work_item_lines: 180
  forbidden_placeholders: "CHANGE_ME|TODO_TEMPLATE|<PROJECT_NAME>"
